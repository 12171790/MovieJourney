spring:
  datasource:
    url: jdbc:postgresql://localhost:6432/moviejourney
    username: dev
    password: dev1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
jwt:
  secret: moviejourney-secret-key-must-be-at-least-32-characters
  expiration: 86400000

server:
  port: 8080